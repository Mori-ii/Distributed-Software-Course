worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # =============================================
    # 负载均衡算法配置（取消注释以切换算法）
    # =============================================

    # 算法1：轮询（Round Robin）- 默认，按顺序依次分发请求
    upstream seckill_backend {
        server seckill-app-1:8081;
        server seckill-app-2:8081;
    }

    # 算法2：加权轮询（Weighted Round Robin）- 按权重比例分发
    # upstream seckill_backend {
    #     server seckill-app-1:8081 weight=3;
    #     server seckill-app-2:8081 weight=1;
    # }

    # 算法3：IP Hash - 同一客户端IP始终路由到同一后端（适合有状态会话）
    # upstream seckill_backend {
    #     ip_hash;
    #     server seckill-app-1:8081;
    #     server seckill-app-2:8081;
    # }

    # 算法4：最少连接（Least Connections）- 转发到当前连接数最少的服务器
    # upstream seckill_backend {
    #     least_conn;
    #     server seckill-app-1:8081;
    #     server seckill-app-2:8081;
    # }

    server {
        listen 80;
        server_name localhost;

        # 将所有请求代理到后端集群
        location / {
            proxy_pass http://seckill_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }
    }
}
