services:

  # ── MySQL ──────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: seckill-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: seckill
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/main/resources/db/seckill.sql:/docker-entrypoint-initdb.d/seckill.sql
    networks:
      - seckill-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: seckill-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - seckill-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Backend instance 1 (port 8081) ────────────────────
  seckill-app-1:
    build: .
    container_name: seckill-app-1
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: 123456
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - seckill-net

  # ── Backend instance 2 (port 8082) ────────────────────
  seckill-app-2:
    build: .
    container_name: seckill-app-2
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: 123456
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: 8081
    ports:
      - "8082:8081"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - seckill-net

  # ── Nginx (port 80) ────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: seckill-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - seckill-app-1
      - seckill-app-2
    networks:
      - seckill-net

networks:
  seckill-net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
