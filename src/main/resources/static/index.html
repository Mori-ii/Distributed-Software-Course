<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>秒杀商城</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; }
        .topbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center;
        }
        .topbar h1 { font-size: 20px; font-weight: 700; }
        .topbar .right { display: flex; align-items: center; gap: 14px; font-size: 14px; }
        .topbar .logout-btn {
            padding: 5px 16px; border: 1px solid rgba(255,255,255,0.6); border-radius: 6px;
            background: transparent; color: #fff; cursor: pointer; font-size: 13px;
        }
        .topbar .logout-btn:hover { background: rgba(255,255,255,0.15); }

        .container { max-width: 860px; margin: 24px auto; padding: 0 16px; }

        .tabs { display: flex; gap: 0; margin-bottom: 20px; border-radius: 8px; overflow: hidden; border: 2px solid #667eea; width: fit-content; }
        .tabs button {
            padding: 8px 28px; border: none; background: #fff; color: #667eea; font-size: 14px;
            cursor: pointer; font-weight: 600; transition: all 0.2s;
        }
        .tabs button.on { background: #667eea; color: #fff; }

        .alert {
            padding: 14px 18px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; display: none;
        }
        .alert.ok { display: block; background: #edf7ed; border: 1px solid #a3d9a5; color: #1b5e20; }
        .alert.err { display: block; background: #fdecea; border: 1px solid #f5c6cb; color: #b71c1c; }

        .product-table { width: 100%; border-collapse: separate; border-spacing: 0; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .product-table th {
            background: #667eea; color: #fff; padding: 12px 16px; text-align: left; font-size: 13px;
            letter-spacing: 0.5px;
        }
        .product-table td { padding: 14px 16px; border-bottom: 1px solid #f0f0f0; font-size: 14px; color: #444; }
        .product-table tr:last-child td { border-bottom: none; }
        .product-table tr:hover td { background: #f8f9ff; }
        .original-price { text-decoration: line-through; color: #aaa; font-size: 13px; }
        .flash-price { color: #764ba2; font-weight: 700; font-size: 16px; }
        .remaining { font-weight: 600; }
        .remaining.zero { color: #bbb; }
        .remaining.low { color: #e53935; }
        .remaining.ok { color: #43a047; }
        .snap-btn {
            padding: 7px 20px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600;
            cursor: pointer; color: #fff; background: linear-gradient(135deg, #667eea, #764ba2); transition: opacity 0.2s;
        }
        .snap-btn:hover { opacity: 0.85; }
        .snap-btn:disabled { background: #ccc; cursor: not-allowed; }

        .empty { text-align: center; color: #aaa; padding: 48px 0; font-size: 15px; }

        .order-row {
            background: #fff; border-radius: 10px; padding: 16px 20px; margin-bottom: 10px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center;
        }
        .order-row .detail { display: flex; gap: 24px; font-size: 14px; color: #555; }
        .order-row .oid { font-weight: 700; color: #333; }
        .badge { padding: 3px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .badge-0 { background: #fff3e0; color: #e65100; }
        .badge-1 { background: #e8f5e9; color: #2e7d32; }
        .badge-2 { background: #e3f2fd; color: #1565c0; }
        .badge-3 { background: #fce4ec; color: #c62828; }

        .toast-msg {
            position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
            padding: 12px 30px; border-radius: 8px; font-size: 14px; font-weight: 600;
            z-index: 999; box-shadow: 0 4px 20px rgba(0,0,0,0.18); transition: opacity 0.4s;
        }
        .toast-msg.ok { background: #667eea; color: #fff; }
        .toast-msg.err { background: #e53935; color: #fff; }
        .toast-msg.fade { opacity: 0; }
    </style>
</head>
<body>

<div class="topbar">
    <h1>秒杀商城</h1>
    <div class="right">
        <span id="greeting"></span>
        <button class="logout-btn" onclick="signOut()">退出登录</button>
    </div>
</div>

<div class="container">
    <div class="tabs">
        <button id="tProducts" class="on" onclick="switchView('products')">秒杀商品</button>
        <button id="tOrders" onclick="switchView('orders')">我的订单</button>
    </div>

    <div id="productsView">
        <div id="alertBox" class="alert"></div>
        <div id="productArea"></div>
    </div>

    <div id="ordersView" style="display:none;">
        <div id="orderArea"></div>
    </div>
</div>

<script>
    const mid = sessionStorage.getItem('memberId');
    const alias = sessionStorage.getItem('alias');
    if (!mid) location.href = 'login.html';
    document.getElementById('greeting').textContent = (alias || '') + '（ID: ' + mid + '）';

    function signOut() { sessionStorage.clear(); location.href = 'login.html'; }

    function switchView(v) {
        document.getElementById('tProducts').className = v === 'products' ? 'on' : '';
        document.getElementById('tOrders').className = v === 'orders' ? 'on' : '';
        document.getElementById('productsView').style.display = v === 'products' ? '' : 'none';
        document.getElementById('ordersView').style.display = v === 'orders' ? '' : 'none';
        if (v === 'orders') fetchOrders();
    }

    async function fetchProducts() {
        const area = document.getElementById('productArea');
        try {
            const r = await fetch('/v1/product/flash/active');
            const j = await r.json();
            if (j.status !== 200 || !j.payload || j.payload.length === 0) {
                area.innerHTML = '<p class="empty">当前没有进行中的秒杀活动</p>'; return;
            }
            let rows = j.payload.map(p => {
                const cls = p.remaining <= 0 ? 'zero' : p.remaining <= 5 ? 'low' : 'ok';
                return `<tr>
                    <td>${esc(p.productName)}</td>
                    <td><span class="original-price">&yen;${p.originalPrice}</span></td>
                    <td><span class="flash-price">&yen;${p.flashPrice}</span></td>
                    <td><span class="remaining ${cls}">${p.remaining}</span></td>
                    <td><button class="snap-btn" onclick="doSnap(${p.flashId})" ${p.remaining<=0?'disabled':''}>
                        ${p.remaining<=0?'已售罄':'立即抢购'}
                    </button></td>
                </tr>`;
            }).join('');
            area.innerHTML = `<table class="product-table">
                <thead><tr><th>商品名称</th><th>原价</th><th>秒杀价</th><th>剩余库存</th><th>操作</th></tr></thead>
                <tbody>${rows}</tbody></table>`;
        } catch (e) {
            area.innerHTML = '<p class="empty">商品加载失败，请检查服务是否启动</p>';
        }
    }

    async function doSnap(flashId) {
        const box = document.getElementById('alertBox');
        box.className = 'alert'; box.style.display = 'none';
        try {
            const r = await fetch('/v1/flash/snap', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `memberId=${encodeURIComponent(mid)}&flashId=${encodeURIComponent(flashId)}`
            });
            const j = await r.json();
            if (j.status === 200) {
                box.className = 'alert ok';
                box.innerHTML = `抢购成功！订单号 #${j.payload.id} — ${esc(j.payload.productName)} — &yen;${j.payload.amount}`;
                toast('订单 #' + j.payload.id + ' 已确认！', 'ok');
                fetchProducts();
            } else {
                box.className = 'alert err';
                box.textContent = j.message;
                toast(j.message, 'err');
            }
        } catch (e) {
            box.className = 'alert err';
            box.textContent = '请求失败：' + e.message;
        }
    }

    async function fetchOrders() {
        const area = document.getElementById('orderArea');
        area.innerHTML = '<p class="empty">加载中...</p>';
        try {
            const r = await fetch('/v1/flash/my-orders?memberId=' + encodeURIComponent(mid));
            const j = await r.json();
            if (j.status !== 200 || !j.payload || j.payload.length === 0) {
                area.innerHTML = '<p class="empty">暂无订单记录</p>'; return;
            }
            const labels = { 0: '待付款', 1: '已付款', 2: '已发货', 3: '已退款' };
            area.innerHTML = j.payload.map(o => `
                <div class="order-row">
                    <div class="detail">
                        <span class="oid">#${o.id}</span>
                        <span>${esc(o.productName)}</span>
                        <span>&yen;${o.amount}</span>
                        <span>${o.createdAt ? o.createdAt.replace('T',' ') : '-'}</span>
                    </div>
                    <span class="badge badge-${o.status}">${labels[o.status]||'未知'}</span>
                </div>`).join('');
        } catch (e) {
            area.innerHTML = '<p class="empty">订单加载失败</p>';
        }
    }

    function esc(s) { const d = document.createElement('div'); d.appendChild(document.createTextNode(s||'')); return d.innerHTML; }

    function toast(msg, type) {
        const el = document.createElement('div');
        el.className = 'toast-msg ' + type; el.textContent = msg;
        document.body.appendChild(el);
        setTimeout(() => el.classList.add('fade'), 2200);
        setTimeout(() => el.remove(), 2700);
    }

    fetchProducts();
</script>
</body>
</html>
